services:
  teacher-bot:
    build: .
    container_name: teacher-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./credentials:/app/credentials:ro
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/teacher_bot.db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
